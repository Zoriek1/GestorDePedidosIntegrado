name: CI

# Deploy secrets (Settings > Secrets and variables > Actions):
#   VPS_HOST         -- IP ou hostname da VPS
#   VPS_USER         -- usuario SSH (ex: root, deploy)
#   VPS_SSH_KEY      -- chave privada SSH (conteudo de ~/.ssh/id_ed25519)
#   VPS_PORT         -- porta SSH (ex: 22)
#   VPS_DEPLOY_PATH  -- caminho do projeto na VPS (ex: /home/deploy/Gestor-de-Pedidos-WEB-PUF)
# Opcional (recomendado se usar Google Maps no frontend em produção):
#   VITE_GOOGLE_MAPS_API_KEY -- mesmo valor que no .env da VPS (build do artefato no CI)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install tzdata

      # Aplica correções no runner e valida. O branch no GitHub não é alterado;
      # para persistir estilo no repo, use pre-commit ou rode ruff/black antes do push.
      - name: Lint + format (ruff fix + black)
        working-directory: backend
        run: |
          ruff check --fix .
          black .

      - name: Verify lint + format
        working-directory: backend
        run: |
          ruff check .
          black --check .

      - name: Unit tests
        working-directory: backend
        env:
          FLASK_ENV: testing
          SQLITE_FOREIGN_KEYS: "OFF"
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          pytest tests/ -v --tb=short \
            --cov=app --cov-report=term-missing \
            -m "not integration and not slow" \
            --timeout=60

      - name: Integration tests
        working-directory: backend
        continue-on-error: true
        env:
          FLASK_ENV: testing
          SQLITE_FOREIGN_KEYS: "OFF"
          PYTHONDONTWRITEBYTECODE: "1"
        run: pytest tests/ -v --tb=short -m "integration" --timeout=120

  frontend:
    name: Frontend
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: TypeScript type check
        working-directory: frontend
        continue-on-error: true
        run: npm run type-check

      - name: Lint (ESLint fix + verify)
        working-directory: frontend
        run: |
          npm run lint:fix
          npm run lint

      - name: Unit tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /api
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        run: npm run build

      - name: Upload frontend dist (deploy VPS sem 2º Vite)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 2

  deploy:
    name: Deploy VPS
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ci-frontend-dist

      - name: Sincronizar repo com origin/main e limpar prebuilt-dist
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            # git pull falha se houver mudança local em arquivos rastreados (ex.: docker-compose.yml).
            # reset --hard alinha com o GitHub; .env e outros ignorados não são afetados.
            git fetch origin main
            git reset --hard origin/main
            mkdir -p docker/prebuilt-dist
            find docker/prebuilt-dist -mindepth 1 -delete

      - name: Copiar dist para VPS (prebuilt)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          source: "ci-frontend-dist/"
          target: "${{ secrets.VPS_DEPLOY_PATH }}/docker/prebuilt-dist"

      - name: Docker compose (USE_PREBUILT_DIST=1)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          command_timeout: 40m
          script: |
            set -e
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            export USE_PREBUILT_DIST=1
            docker compose up -d --build
            docker image prune -f
