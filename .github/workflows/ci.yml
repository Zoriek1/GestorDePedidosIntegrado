name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run ruff linter
        working-directory: backend
        run: ruff check .

      - name: Check code formatting with black
        working-directory: backend
        run: black --check .

      - name: Run pytest (unit tests)
        working-directory: backend
        env:
          SQLITE_FOREIGN_KEYS: "OFF"
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing -m "not integration and not slow"

      - name: Run pytest (integration tests)
        working-directory: backend
        env:
          SQLITE_FOREIGN_KEYS: "OFF"
        run: |
          pytest tests/ -v -m "integration" --tb=short

  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend_v2/package-lock.json

      - name: Install dependencies
        working-directory: frontend_v2
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run TypeScript type check
        working-directory: frontend_v2
        run: npx tsc --noEmit

      - name: Run ESLint
        working-directory: frontend_v2
        run: npm run lint

      - name: Build frontend
        working-directory: frontend_v2
        run: npm run build
