name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # Normalize line endings to LF
        lfs: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install dependencies
      working-directory: ./backend
      run: |
        set -e
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Debug versions
      working-directory: ./backend
      run: |
        echo "Python version: $(python --version)"
        echo "Black version: $(black --version)"
        echo "Git commit: $(git rev-parse HEAD)"
        echo "Line endings check:"
        git ls-files --eol backend/app/routes/pedidos.py backend/scripts/export/exportar_vendas_sheets.py backend/app/routes/api.py || true

    - name: Lint with ruff
      working-directory: ./backend
      run: |
        set -e
        ruff check --fix .
        ruff check .

    - name: Check formatting with black
      working-directory: ./backend
      run: |
        set -e
        black --check .

    - name: Run tests with pytest
      working-directory: ./backend
      run: |
        set -e
        pytest --cov=app --cov-report=term-missing

  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend_v2/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend_v2
      run: |
        set -e
        npm ci --prefer-offline --no-audit --no-fund

    - name: Type check
      working-directory: ./frontend_v2
      run: |
        set -e
        npx tsc --noEmit

    - name: Lint
      working-directory: ./frontend_v2
      run: |
        set -e
        npm run lint

    - name: Build
      working-directory: ./frontend_v2
      run: |
        set -e
        npm run build
