name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  # Variáveis de ambiente para testes (sem valores reais)
  META_PIXEL_ID: "test_pixel_id"
  META_CAPI_ACCESS_TOKEN: "test_access_token"
  META_CAPI_USE_GATEWAY: "false"
  META_CAPI_DEBUG: "false"
  FLASK_ENV: "testing"

jobs:
  # Job 1: Linting e formatação
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install dependencies
      working-directory: ./backend
      run: |
        set -e
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with ruff
      working-directory: ./backend
      run: |
        set -e
        ruff check .

    - name: Check formatting with black
      working-directory: ./backend
      run: |
        set -e
        black --check .

  # Job 2: Testes Unitários
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install dependencies
      working-directory: ./backend
      run: |
        set -e
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run unit tests
      working-directory: ./backend
      run: |
        set -e
        pytest tests/ -v --cov=app --cov-report=term-missing -m "not integration and not slow"

  # Job 3: Testes de Integração
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install dependencies
      working-directory: ./backend
      run: |
        set -e
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run integration tests
      working-directory: ./backend
      run: |
        set -e
        pytest tests/ -v -m "integration" --tb=short

  # Job 4: Frontend
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend_v2/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend_v2
      run: |
        set -e
        npm ci --prefer-offline --no-audit --no-fund

    - name: Type check
      working-directory: ./frontend_v2
      run: |
        set -e
        npx tsc --noEmit

    - name: Lint
      working-directory: ./frontend_v2
      run: |
        set -e
        npm run lint

    - name: Build
      working-directory: ./frontend_v2
      run: |
        set -e
        npm run build
