# Plante Uma Flor - Deploy VPS
# Uso: cp .env.example .env && docker compose up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gestor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-gestor_pedidos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestor} -d ${POSTGRES_DB:-gestor_pedidos}"]
      interval: 5s
      timeout: 7s
      retries: 5

  backend:
    build:
      context: .
      args:
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      APP_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-gestor}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gestor_pedidos}
      SECRET_KEY: ${SECRET_KEY:?Defina SECRET_KEY no .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      HOST: 0.0.0.0
      PORT: 5000
      USE_HTTPS: ${USE_HTTPS:-false}
      GOOGLE_APPLICATION_CREDENTIALS: /app/backend/user/config/google_credentials.json
      # Nuvemshop (obrigatório para puxar pedidos; ver backend/docs/NUVEMSHOP_CREDENTIALS.md)
      NUVEMSHOP_APP_ID: ${NUVEMSHOP_APP_ID:-}
      NUVEMSHOP_CLIENT_SECRET: ${NUVEMSHOP_CLIENT_SECRET:-}
      NUVEMSHOP_USER_AGENT: ${NUVEMSHOP_USER_AGENT:-}
      NUVEMSHOP_PUBLIC_BASE_URL: ${NUVEMSHOP_PUBLIC_BASE_URL:-}
      # Google Maps Platform (geocodificação e rotas)
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    volumes:
      # Montamos apenas a pasta backend para evitar confusão de caminhos
      - ./backend:/app/backend
    ports:
      - "5000:5000"

volumes:
  postgres_data:
