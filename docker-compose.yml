# Plante Uma Flor - Deploy VPS
# Uso: cp .env.example .env && docker compose up -d
#
# USE_PREBUILT_DIST=1 — usa docker/prebuilt-dist/ (ex.: deploy via CI) e não roda Vite na VPS.
# capi-worker usa target capi-worker (imagem sem Node).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gestor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-gestor_pedidos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestor} -d ${POSTGRES_DB:-gestor_pedidos}"]
      interval: 5s
      timeout: 7s
      retries: 5

  backend:
    build:
      context: .
      target: backend
      args:
        USE_PREBUILT_DIST: ${USE_PREBUILT_DIST:-0}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Garante variáveis do .env no container (evita None quando o compose local está desatualizado).
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      APP_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-gestor}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gestor_pedidos}
      SECRET_KEY: ${SECRET_KEY:?Defina SECRET_KEY no .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      HOST: 0.0.0.0
      PORT: 5000
      USE_HTTPS: ${USE_HTTPS:-false}
      GOOGLE_APPLICATION_CREDENTIALS: /app/backend/user/config/google_credentials.json
      # Nuvemshop (obrigatório para puxar pedidos; ver docs/integrations.md)
      NUVEMSHOP_APP_ID: ${NUVEMSHOP_APP_ID:-}
      NUVEMSHOP_CLIENT_SECRET: ${NUVEMSHOP_CLIENT_SECRET:-}
      NUVEMSHOP_USER_AGENT: ${NUVEMSHOP_USER_AGENT:-}
      NUVEMSHOP_PUBLIC_BASE_URL: ${NUVEMSHOP_PUBLIC_BASE_URL:-}
      # Meta CAPI (obrigatório para envio de eventos)
      META_PIXEL_ID: ${META_PIXEL_ID:-}
      META_CAPI_ACCESS_TOKEN: ${META_CAPI_ACCESS_TOKEN:-}
      META_CAPI_API_VERSION: ${META_CAPI_API_VERSION:-v21.0}
      META_TEST_EVENT_CODE: ${META_TEST_EVENT_CODE:-}
      META_CAPI_USE_GATEWAY: ${META_CAPI_USE_GATEWAY:-false}
      META_CAPI_GATEWAY_DOMAIN: ${META_CAPI_GATEWAY_DOMAIN:-gestaopedidos.planteumaflor.online}
      META_CAPI_GATEWAY_ENDPOINT: ${META_CAPI_GATEWAY_ENDPOINT:-}
      # META_CAPI_LEAD_FUNNEL_ENABLED: use o .env (env_file acima)
      # UTMify (API de pedidos / conversões)
      UTMIFY_ENABLED: ${UTMIFY_ENABLED:-false}
      UTMIFY_API_TOKEN: ${UTMIFY_API_TOKEN:-}
      UTMIFY_POSTBACK_URL: ${UTMIFY_POSTBACK_URL:-https://api.utmify.com.br/api-credentials/orders}
      UTMIFY_PLATFORM: ${UTMIFY_PLATFORM:-WhatsAppManual}
      UTMIFY_TIMEOUT_SECONDS: ${UTMIFY_TIMEOUT_SECONDS:-5}
      UTMIFY_IS_TEST: ${UTMIFY_IS_TEST:-false}
      # Google Credentials (Sheets export + Drive backup)
      # Cole o conteúdo do google_credentials.json como string JSON em uma linha no .env
      GOOGLE_CREDENTIALS_JSON: ${GOOGLE_CREDENTIALS_JSON:-}
      # Google Maps Platform (geocodificação e rotas)
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      # Evolution API: segredo que valida o webhook /api/leads/whatsapp-inbound
      EVOLUTION_WEBHOOK_SECRET: ${EVOLUTION_WEBHOOK_SECRET:-}
    volumes:
      - ./backend:/app/backend
    ports:
      - "5000:5000"

  capi-worker:
    build:
      context: .
      target: capi-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: ["python", "meta_capi_worker_entrypoint.py"]
    environment:
      FLASK_ENV: production
      APP_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-gestor}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gestor_pedidos}
      SECRET_KEY: ${SECRET_KEY:?Defina SECRET_KEY no .env}
      META_PIXEL_ID: ${META_PIXEL_ID:-}
      META_CAPI_ACCESS_TOKEN: ${META_CAPI_ACCESS_TOKEN:-}
      META_CAPI_API_VERSION: ${META_CAPI_API_VERSION:-v21.0}
      META_TEST_EVENT_CODE: ${META_TEST_EVENT_CODE:-}
      META_CAPI_USE_GATEWAY: ${META_CAPI_USE_GATEWAY:-false}
      META_CAPI_GATEWAY_DOMAIN: ${META_CAPI_GATEWAY_DOMAIN:-gestaopedidos.planteumaflor.online}
      META_CAPI_GATEWAY_ENDPOINT: ${META_CAPI_GATEWAY_ENDPOINT:-}
      # Polling assíncrono do outbox (envio em segundo plano)
      META_CAPI_WORKER_INTERVAL_SECONDS: ${META_CAPI_WORKER_INTERVAL_SECONDS:-5}
      META_CAPI_RETRY_BACKOFF_SECONDS: ${META_CAPI_RETRY_BACKOFF_SECONDS:-300}
      META_SCHEDULER_HOUR: ${META_SCHEDULER_HOUR:-23}
    volumes:
      - ./backend:/app/backend

  # ---------------------------------------------------------------------------
  # Evolution API (WhatsApp listener read-only) — captura automática de telefone
  # de leads. Lê messages.upsert e POSTa em /api/leads/whatsapp-inbound.
  # NÃO envia mensagens. Banco/cache próprios, isolados do Postgres de produção.
  #
  # OPT-IN: estes serviços só sobem com o profile `evolution`. Para ativar, defina
  # COMPOSE_PROFILES=evolution no .env (assim `docker compose up -d` os inclui) ou
  # rode `docker compose --profile evolution up -d`. Sem isso, o stack base
  # (db/backend/capi-worker) sobe inalterado.
  # ---------------------------------------------------------------------------
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: evolution_api
    restart: unless-stopped
    profiles: ["evolution"]
    depends_on:
      - evolution_db
      - evolution_redis
    environment:
      # Config do Evolution vem do .env ÚNICO da raiz (sem .env.evolution).
      # A senha do banco é derivada de EVOLUTION_DB_PASSWORD (fonte única).
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-CHANGE_ME_set_EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_DB_PASSWORD:-evolution}@evolution_db:5432/evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution_redis:6379/0
    ports:
      # Host 8081 → container 8080 (a 8080 do host costuma estar ocupada).
      # Aponte o Cloudflare Tunnel para a porta 8081.
      - "8081:8080"
    volumes:
      - evolution_instances:/evolution/instances

  evolution_db:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["evolution"]
    environment:
      POSTGRES_USER: evolution
      # Banco interno (sem ports expostos). Defina EVOLUTION_DB_PASSWORD no .env;
      # o default existe só para o stack base não falhar na interpolação.
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD:-evolution}
      POSTGRES_DB: evolution
    volumes:
      - evolution_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 7s
      retries: 5

  evolution_redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["evolution"]
    volumes:
      - evolution_redis:/data

volumes:
  postgres_data:
  evolution_instances:
  evolution_pg:
  evolution_redis:
