# Plante Uma Flor - Deploy VPS
# Uso: cp .env.example .env && docker compose up -d
#
# USE_PREBUILT_DIST=1 — usa docker/prebuilt-dist/ (ex.: deploy via CI) e não roda Vite na VPS.
# capi-worker usa target capi-worker (imagem sem Node).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gestor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-gestor_pedidos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestor} -d ${POSTGRES_DB:-gestor_pedidos}"]
      interval: 5s
      timeout: 7s
      retries: 5

  evolution-db:
    image: postgres:15-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=1000"]
    environment:
      POSTGRES_USER: ${EVOLUTION_POSTGRES_USER:-evolution}
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD:?Defina EVOLUTION_POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${EVOLUTION_POSTGRES_DB:-evolution}
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EVOLUTION_POSTGRES_USER:-evolution} -d ${EVOLUTION_POSTGRES_DB:-evolution}"]
      interval: 5s
      timeout: 7s
      retries: 5

  evolution-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  evolution-api:
    image: ${EVOLUTION_IMAGE:-atendai/evolution-api:latest}
    restart: unless-stopped
    depends_on:
      evolution-db:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    environment:
      SERVER_NAME: evolution
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:8080}
      CORS_ORIGIN: ${EVOLUTION_CORS_ORIGIN:-*}
      CORS_METHODS: GET,POST,PUT,DELETE
      CORS_CREDENTIALS: "true"
      LOG_LEVEL: ${EVOLUTION_LOG_LEVEL:-ERROR,WARN,INFO,LOG,WEBHOOKS}
      LOG_COLOR: "true"
      LOG_BAILEYS: ${EVOLUTION_LOG_BAILEYS:-error}
      DEL_INSTANCE: ${EVOLUTION_DEL_INSTANCE:-false}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${EVOLUTION_POSTGRES_USER:-evolution}:${EVOLUTION_POSTGRES_PASSWORD}@evolution-db:5432/${EVOLUTION_POSTGRES_DB:-evolution}?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: ${EVOLUTION_DATABASE_CLIENT_NAME:-gestor_pedidos_evolution}
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/6
      CACHE_REDIS_PREFIX_KEY: ${EVOLUTION_REDIS_PREFIX_KEY:-gestor_pedidos_evolution}
      CACHE_REDIS_SAVE_INSTANCES: ${EVOLUTION_REDIS_SAVE_INSTANCES:-false}
      WEBHOOK_GLOBAL_ENABLED: ${EVOLUTION_WEBHOOK_GLOBAL_ENABLED:-true}
      WEBHOOK_GLOBAL_URL: ${EVOLUTION_WEBHOOK_GLOBAL_URL:-http://backend:5000/api/leads/whatsapp-start}
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_MESSAGES_SET: "false"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "false"
      WEBHOOK_EVENTS_MESSAGES_DELETE: "false"
      WEBHOOK_EVENTS_SEND_MESSAGE: "false"
      WEBHOOK_EVENTS_ERRORS: "true"
      CONFIG_SESSION_PHONE_CLIENT: ${EVOLUTION_SESSION_PHONE_CLIENT:-Plante uma Flor}
      CONFIG_SESSION_PHONE_NAME: ${EVOLUTION_SESSION_PHONE_NAME:-Chrome}
      QRCODE_LIMIT: ${EVOLUTION_QRCODE_LIMIT:-30}
      QRCODE_COLOR: ${EVOLUTION_QRCODE_COLOR:-#175197}
      AUTHENTICATION_API_KEY: ${EVOLUTION_AUTHENTICATION_API_KEY:?Defina EVOLUTION_AUTHENTICATION_API_KEY no .env}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: ${EVOLUTION_AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES:-true}
      LANGUAGE: ${EVOLUTION_LANGUAGE:-pt-BR}
    ports:
      - "${EVOLUTION_PORT:-8080}:8080"

  backend:
    build:
      context: .
      target: backend
      args:
        USE_PREBUILT_DIST: ${USE_PREBUILT_DIST:-0}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Garante variáveis do .env no container (evita None quando o compose local está desatualizado).
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      APP_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-gestor}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gestor_pedidos}
      SECRET_KEY: ${SECRET_KEY:?Defina SECRET_KEY no .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      HOST: 0.0.0.0
      PORT: 5000
      USE_HTTPS: ${USE_HTTPS:-false}
      GOOGLE_APPLICATION_CREDENTIALS: /app/backend/user/config/google_credentials.json
      # Nuvemshop (obrigatório para puxar pedidos; ver docs/integrations.md)
      NUVEMSHOP_APP_ID: ${NUVEMSHOP_APP_ID:-}
      NUVEMSHOP_CLIENT_SECRET: ${NUVEMSHOP_CLIENT_SECRET:-}
      NUVEMSHOP_USER_AGENT: ${NUVEMSHOP_USER_AGENT:-}
      NUVEMSHOP_PUBLIC_BASE_URL: ${NUVEMSHOP_PUBLIC_BASE_URL:-}
      # Bling API v3
      BLING_ENABLED: ${BLING_ENABLED:-false}
      BLING_CLIENT_ID: ${BLING_CLIENT_ID:-}
      BLING_CLIENT_SECRET: ${BLING_CLIENT_SECRET:-}
      BLING_REDIRECT_URI: ${BLING_REDIRECT_URI:-}
      BLING_API_BASE_URL: ${BLING_API_BASE_URL:-https://api.bling.com.br/Api/v3}
      BLING_AUTH_BASE_URL: ${BLING_AUTH_BASE_URL:-https://www.bling.com.br/Api/v3/oauth}
      BLING_TIMEOUT_SECONDS: ${BLING_TIMEOUT_SECONDS:-20}
      BLING_DEFAULT_PRODUCT_CODE: ${BLING_DEFAULT_PRODUCT_CODE:-PEDIDO-FLORICULTURA}
      BLING_STORE_ID: ${BLING_STORE_ID:-default}
      # Meta CAPI (obrigatório para envio de eventos)
      META_PIXEL_ID: ${META_PIXEL_ID:-}
      META_CAPI_ACCESS_TOKEN: ${META_CAPI_ACCESS_TOKEN:-}
      META_CAPI_API_VERSION: ${META_CAPI_API_VERSION:-v21.0}
      META_TEST_EVENT_CODE: ${META_TEST_EVENT_CODE:-}
      META_CAPI_USE_GATEWAY: ${META_CAPI_USE_GATEWAY:-false}
      META_CAPI_GATEWAY_DOMAIN: ${META_CAPI_GATEWAY_DOMAIN:-gestaopedidos.planteumaflor.online}
      META_CAPI_GATEWAY_ENDPOINT: ${META_CAPI_GATEWAY_ENDPOINT:-}
      # META_CAPI_LEAD_FUNNEL_ENABLED: use o .env (env_file acima)
      # UTMify (API de pedidos / conversões)
      UTMIFY_ENABLED: ${UTMIFY_ENABLED:-false}
      UTMIFY_API_TOKEN: ${UTMIFY_API_TOKEN:-}
      UTMIFY_POSTBACK_URL: ${UTMIFY_POSTBACK_URL:-https://api.utmify.com.br/api-credentials/orders}
      UTMIFY_PLATFORM: ${UTMIFY_PLATFORM:-WhatsAppManual}
      UTMIFY_TIMEOUT_SECONDS: ${UTMIFY_TIMEOUT_SECONDS:-5}
      UTMIFY_IS_TEST: ${UTMIFY_IS_TEST:-false}
      # Google Credentials (Sheets export + Drive backup)
      # Cole o conteúdo do google_credentials.json como string JSON em uma linha no .env
      GOOGLE_CREDENTIALS_JSON: ${GOOGLE_CREDENTIALS_JSON:-}
      # Google Maps Platform (geocodificação e rotas)
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    volumes:
      - ./backend:/app/backend
    ports:
      - "5000:5000"

  capi-worker:
    build:
      context: .
      target: capi-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: ["python", "meta_capi_worker_entrypoint.py"]
    environment:
      FLASK_ENV: production
      APP_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-gestor}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gestor_pedidos}
      SECRET_KEY: ${SECRET_KEY:?Defina SECRET_KEY no .env}
      META_PIXEL_ID: ${META_PIXEL_ID:-}
      META_CAPI_ACCESS_TOKEN: ${META_CAPI_ACCESS_TOKEN:-}
      META_CAPI_API_VERSION: ${META_CAPI_API_VERSION:-v21.0}
      META_TEST_EVENT_CODE: ${META_TEST_EVENT_CODE:-}
      META_CAPI_USE_GATEWAY: ${META_CAPI_USE_GATEWAY:-false}
      META_CAPI_GATEWAY_DOMAIN: ${META_CAPI_GATEWAY_DOMAIN:-gestaopedidos.planteumaflor.online}
      META_CAPI_GATEWAY_ENDPOINT: ${META_CAPI_GATEWAY_ENDPOINT:-}
      # Polling assíncrono do outbox (envio em segundo plano)
      META_CAPI_WORKER_INTERVAL_SECONDS: ${META_CAPI_WORKER_INTERVAL_SECONDS:-5}
      META_CAPI_RETRY_BACKOFF_SECONDS: ${META_CAPI_RETRY_BACKOFF_SECONDS:-300}
      META_SCHEDULER_HOUR: ${META_SCHEDULER_HOUR:-23}
    volumes:
      - ./backend:/app/backend

  bling-worker:
    build:
      context: .
      target: capi-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: ["python", "bling_worker_entrypoint.py"]
    environment:
      FLASK_ENV: production
      APP_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-gestor}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gestor_pedidos}
      SECRET_KEY: ${SECRET_KEY:?Defina SECRET_KEY no .env}
      BLING_ENABLED: ${BLING_ENABLED:-false}
      BLING_CLIENT_ID: ${BLING_CLIENT_ID:-}
      BLING_CLIENT_SECRET: ${BLING_CLIENT_SECRET:-}
      BLING_REDIRECT_URI: ${BLING_REDIRECT_URI:-}
      BLING_API_BASE_URL: ${BLING_API_BASE_URL:-https://api.bling.com.br/Api/v3}
      BLING_AUTH_BASE_URL: ${BLING_AUTH_BASE_URL:-https://www.bling.com.br/Api/v3/oauth}
      BLING_TIMEOUT_SECONDS: ${BLING_TIMEOUT_SECONDS:-20}
      BLING_DEFAULT_PRODUCT_CODE: ${BLING_DEFAULT_PRODUCT_CODE:-PEDIDO-FLORICULTURA}
      BLING_STORE_ID: ${BLING_STORE_ID:-default}
      BLING_WORKER_INTERVAL_SECONDS: ${BLING_WORKER_INTERVAL_SECONDS:-10}
      BLING_WORKER_LIMIT: ${BLING_WORKER_LIMIT:-20}
    volumes:
      - ./backend:/app/backend

volumes:
  postgres_data:
  evolution_postgres_data:
  evolution_redis_data:
