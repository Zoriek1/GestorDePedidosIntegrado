<!-- Página: Login -->
<div class="max-w-md mx-auto mt-8 sm:mt-12">
    <div class="bg-white rounded-lg shadow-lg p-6 sm:p-8">
        <!-- Logo e Título -->
        <div class="text-center mb-6">
            <img src="/assets/images/Logo.png" alt="Plante Uma Flor" class="mx-auto h-16 mb-4">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-2">
                <i class="fas fa-lock text-primary"></i>
                <span class="ml-2">Acesso ao Sistema</span>
            </h1>
            <p class="text-sm text-gray-600">
                Faça login para criar e gerenciar pedidos
            </p>
        </div>

        <!-- Formulário de Login -->
        <form id="login-form" class="space-y-4">
            <!-- Campo Usuário -->
            <div>
                <label for="login-username" class="block text-sm font-medium text-gray-700 mb-1">
                    <i class="fas fa-user"></i> Usuário
                </label>
                <input 
                    type="text" 
                    id="login-username" 
                    name="username"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                    placeholder="Digite seu usuário"
                    required
                    autocomplete="username"
                >
            </div>

            <!-- Campo Senha -->
            <div>
                <label for="login-password" class="block text-sm font-medium text-gray-700 mb-1">
                    <i class="fas fa-key"></i> Senha
                </label>
                <input 
                    type="password" 
                    id="login-password" 
                    name="password"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                    placeholder="Digite sua senha"
                    required
                    autocomplete="current-password"
                >
            </div>

            <!-- Checkbox Lembrar-me -->
            <div class="flex items-center">
                <input 
                    type="checkbox" 
                    id="login-remember" 
                    name="remember"
                    class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary"
                >
                <label for="login-remember" class="ml-2 text-sm text-gray-700">
                    Lembrar-me (salvar credenciais)
                </label>
            </div>

            <!-- Mensagem de Erro -->
            <div id="login-error" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
                <i class="fas fa-exclamation-circle"></i>
                <span id="login-error-text"></span>
            </div>

            <!-- Botões de Ação -->
            <div class="space-y-2">
                <button 
                    type="submit" 
                    id="btn-login-edit"
                    class="w-full bg-primary hover:bg-secondary text-white font-semibold py-3 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center"
                >
                    <i class="fas fa-sign-in-alt mr-2"></i>
                    Entrar para Editar
                </button>
                
                <button 
                    type="button" 
                    id="btn-login-view"
                    class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-3 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center"
                >
                    <i class="fas fa-eye mr-2"></i>
                    Continuar sem Login (Apenas Visualizar)
                </button>
            </div>
        </form>

        <!-- Informação -->
        <div class="mt-6 pt-6 border-t border-gray-200">
            <p class="text-xs text-gray-500 text-center">
                <i class="fas fa-info-circle"></i>
                Você pode visualizar pedidos sem login. 
                O login é necessário apenas para criar ou deletar pedidos.
            </p>
        </div>
    </div>
</div>
