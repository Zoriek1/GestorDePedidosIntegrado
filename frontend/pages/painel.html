<!-- Página: Painel de Gestão -->
<div>
    <!-- Cabeçalho -->
    <div class="bg-white rounded-lg shadow-md p-4 sm:p-6 mb-4 sm:mb-6">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 sm:gap-4">
            <div class="min-w-0 flex-1">
                <h1 class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-800 mb-1 sm:mb-2 truncate">
                    <i class="fas fa-th-large text-primary"></i>
                    <span class="ml-2">Painel de Gestão</span>
                </h1>
                <p class="text-sm sm:text-base text-gray-600">Gerencie todos os pedidos em um só lugar</p>
            </div>

            <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                <sl-button id="btn-refresh" variant="default" size="small" class="flex-1 sm:flex-none" title="Atualizar">
                    <i class="fas fa-sync-alt"></i>
                    <span class="hidden sm:inline ml-1">Atualizar</span>
                </sl-button>
                <sl-button id="btn-cleanup" variant="default" size="small" class="flex-1 sm:flex-none" title="Limpar Antigos">
                    <i class="fas fa-broom"></i>
                    <span class="hidden sm:inline ml-1">Limpar</span>
                </sl-button>
                <sl-button onclick="Router.navigate('/fontes-pedido')" variant="default" size="small" class="flex-1 sm:flex-none" title="Gerenciar Fontes de Pedido">
                    <i class="fas fa-folder"></i>
                    <span class="hidden sm:inline ml-1">Fontes</span>
                </sl-button>
                <sl-button id="btn-exportar-planilha" variant="default" size="small" class="flex-1 sm:flex-none" title="Exportar para Google Sheets">
                    <i class="fas fa-file-excel"></i>
                    <span class="hidden sm:inline ml-1">Planilha</span>
                </sl-button>
                <sl-button id="btn-novo-pedido-painel" variant="primary" size="small" class="flex-1 sm:flex-none" onclick="Router.navigate('/criar-pedido')">
                    <i class="fas fa-plus-circle"></i>
                    <span class="hidden sm:inline ml-1">Novo Pedido</span>
                </sl-button>
            </div>
        </div>
    </div>

    <!-- Estatísticas -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 sm:gap-4 mb-4 sm:mb-6">
        <!-- Total -->
        <sl-card class="stat-card">
            <div class="flex items-center justify-between gap-2">
                <div class="min-w-0 flex-1">
                    <p class="text-xs sm:text-sm text-gray-600 mb-1 truncate">Total</p>
                    <p id="stat-total" class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-800 truncate" data-count="0">0</p>
                </div>
                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-list text-lg sm:text-2xl text-blue-600"></i>
                </div>
            </div>
        </sl-card>

        <!-- Agendados -->
        <sl-card class="stat-card">
            <div class="flex items-center justify-between gap-2">
                <div class="min-w-0 flex-1">
                    <p class="text-xs sm:text-sm text-gray-600 mb-1 truncate">Agendados</p>
                    <p id="stat-agendado" class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-800 truncate" data-count="0">0</p>
                </div>
                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-gray-100 rounded-full flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-clock text-lg sm:text-2xl text-gray-600"></i>
                </div>
            </div>
        </sl-card>

        <!-- Em Produção -->
        <sl-card class="stat-card">
            <div class="flex items-center justify-between gap-2">
                <div class="min-w-0 flex-1">
                    <p class="text-xs sm:text-sm text-gray-600 mb-1 truncate">Produção</p>
                    <p id="stat-producao" class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-800 truncate" data-count="0">0</p>
                </div>
                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-yellow-100 rounded-full flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-cogs text-lg sm:text-2xl text-yellow-600"></i>
                </div>
            </div>
        </sl-card>

        <!-- Prontos -->
        <sl-card class="stat-card">
            <div class="flex items-center justify-between gap-2">
                <div class="min-w-0 flex-1">
                    <p class="text-xs sm:text-sm text-gray-600 mb-1 truncate">Prontos</p>
                    <p id="stat-pronto" class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-800 truncate" data-count="0">0</p>
                </div>
                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-green-100 rounded-full flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-check-circle text-lg sm:text-2xl text-green-600"></i>
                </div>
            </div>
        </sl-card>
    </div>

    <!-- Filtros e Busca -->
    <div class="bg-white rounded-lg shadow-md p-3 sm:p-4 mb-4 sm:mb-6">
            <div class="flex flex-col gap-3 sm:gap-4">
                <!-- Busca -->
                <div class="flex-1 w-full">
                    <sl-input 
                        id="search-input"
                        placeholder="Buscar por cliente, destinatário ou produto..."
                        clearable
                        class="w-full">
                        <i class="fas fa-search" slot="prefix"></i>
                    </sl-input>
                </div>

            <!-- Filtros de Data -->
            <div class="flex flex-wrap gap-2">
                <button 
                    data-filter-date="todos"
                    class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm rounded-lg transition active bg-primary text-white"
                >
                    <i class="fas fa-calendar-alt"></i>
                    <span class="ml-1">Todos</span>
                </button>
                <button 
                    data-filter-date="hoje"
                    class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm rounded-lg transition bg-gray-200 text-gray-700 hover:bg-gray-300"
                >
                    <i class="fas fa-calendar-day"></i>
                    <span class="ml-1">Hoje</span>
                </button>
                <button 
                    data-filter-date="amanha"
                    class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm rounded-lg transition bg-gray-200 text-gray-700 hover:bg-gray-300"
                >
                    <i class="fas fa-calendar-plus"></i>
                    <span class="ml-1">Amanhã</span>
                </button>
                <button 
                    data-filter-date="semana"
                    class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm rounded-lg transition bg-gray-200 text-gray-700 hover:bg-gray-300"
                >
                    <i class="fas fa-calendar-week"></i>
                    <span class="ml-1 hidden sm:inline">Nesta Semana</span>
                    <span class="ml-1 sm:hidden">Semana</span>
                </button>
            </div>

            <!-- Filtros de Status -->
            <div class="flex flex-wrap gap-2">
                <button 
                    data-filter-status="todos"
                    class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm rounded-lg transition active bg-primary text-white"
                >
                    Todos
                </button>
                <button 
                    data-filter-status="agendado"
                    class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm rounded-lg transition bg-gray-200 text-gray-700 hover:bg-gray-300"
                >
                    Agendado
                </button>
                <button 
                    data-filter-status="em_producao"
                    class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm rounded-lg transition bg-gray-200 text-gray-700 hover:bg-gray-300"
                >
                    Em Produção
                </button>
                <button 
                    data-filter-status="pronto_entrega"
                    class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm rounded-lg transition bg-gray-200 text-gray-700 hover:bg-gray-300"
                >
                    Pronto
                </button>
                <button 
                    data-filter-status="concluido"
                    class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm rounded-lg transition bg-gray-200 text-gray-700 hover:bg-gray-300"
                >
                    Concluído
                </button>
                
                <!-- Separador -->
                <div class="w-px bg-gray-300 mx-1 hidden sm:block"></div>
                
                <!-- Botão Ordenar por Distância -->
                <button 
                    id="btn-ordenar-distancia"
                    class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm rounded-lg transition bg-blue-100 text-blue-700 hover:bg-blue-200 flex items-center gap-1"
                    title="Ordenar por distância da floricultura"
                >
                    <i class="fas fa-route"></i>
                    <span class="hidden sm:inline">Distância</span>
                </button>
                
                <!-- Botão Calcular Rota Otimizada -->
                <button 
                    id="btn-rota-otimizada"
                    class="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm rounded-lg transition bg-green-100 text-green-700 hover:bg-green-200 flex items-center gap-1"
                    title="Calcular rota otimizada para entrega"
                >
                    <i class="fas fa-map-marked-alt"></i>
                    <span class="hidden sm:inline">Rota Otimizada</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Lista de Pedidos -->
    <div id="pedidos-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- Pedidos serão carregados aqui via JavaScript -->
        
        <!-- Loading Skeleton -->
        <sl-card>
            <sl-skeleton effect="pulse" style="height: 256px;"></sl-skeleton>
        </sl-card>
        <sl-card>
            <sl-skeleton effect="pulse" style="height: 256px;"></sl-skeleton>
        </sl-card>
        <sl-card>
            <sl-skeleton effect="pulse" style="height: 256px;"></sl-skeleton>
        </sl-card>
    </div>
</div>
